<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c3828"/>
      <stop offset="100%" stop-color="#7c3a18"/>
    </linearGradient>
    <filter id="soft"><feGaussianBlur stdDeviation="28"/></filter>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)"/>
  <!-- 배경 글로우 -->
  <circle cx="380" cy="340" r="220" fill="rgba(255,255,255,0.05)" filter="url(#soft)"/>
  <circle cx="820" cy="340" r="220" fill="rgba(255,255,255,0.05)" filter="url(#soft)"/>
  <!-- 중앙 분리선 -->
  <line x1="600" y1="120" x2="600" y2="600" stroke="rgba(255,255,255,0.18)" stroke-width="2" stroke-dasharray="12 8"/>

  <!-- 왼쪽: AI가 잘하는 것 (체크마크들) -->
  <!-- 원형 배경 -->
  <circle cx="340" cy="280" r="80" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.20)" stroke-width="2"/>
  <!-- 체크마크 -->
  <path d="M 305 280 L 328 304 L 375 256" fill="none" stroke="rgba(255,255,255,0.85)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 작은 체크 항목들 -->
  <line x1="200" y1="410" x2="240" y2="410" stroke="rgba(255,255,255,0.50)" stroke-width="3" stroke-linecap="round"/>
  <path d="M 200 410 L 210 420 L 228 400" fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="248" y="402" width="120" height="10" rx="5" fill="rgba(255,255,255,0.25)"/>

  <path d="M 200 450 L 210 460 L 228 440" fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="248" y="442" width="90" height="10" rx="5" fill="rgba(255,255,255,0.20)"/>

  <path d="M 200 490 L 210 500 L 228 480" fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="248" y="482" width="110" height="10" rx="5" fill="rgba(255,255,255,0.22)"/>

  <!-- 오른쪽: AI가 못하는 것 (X마크들) -->
  <circle cx="860" cy="280" r="80" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
  <!-- X 마크 -->
  <line x1="828" y1="248" x2="892" y2="312" stroke="rgba(255,255,255,0.50)" stroke-width="9" stroke-linecap="round"/>
  <line x1="892" y1="248" x2="828" y2="312" stroke="rgba(255,255,255,0.50)" stroke-width="9" stroke-linecap="round"/>

  <!-- 작은 X 항목들 -->
  <line x1="720" y1="402" x2="734" y2="418" stroke="rgba(255,255,255,0.35)" stroke-width="3" stroke-linecap="round"/>
  <line x1="734" y1="402" x2="720" y2="418" stroke="rgba(255,255,255,0.35)" stroke-width="3" stroke-linecap="round"/>
  <rect x="754" y="402" width="130" height="10" rx="5" fill="rgba(255,255,255,0.15)"/>

  <line x1="720" y1="442" x2="734" y2="458" stroke="rgba(255,255,255,0.35)" stroke-width="3" stroke-linecap="round"/>
  <line x1="734" y1="442" x2="720" y2="458" stroke="rgba(255,255,255,0.35)" stroke-width="3" stroke-linecap="round"/>
  <rect x="754" y="442" width="100" height="10" rx="5" fill="rgba(255,255,255,0.12)"/>

  <line x1="720" y1="482" x2="734" y2="498" stroke="rgba(255,255,255,0.35)" stroke-width="3" stroke-linecap="round"/>
  <line x1="734" y1="482" x2="720" y2="498" stroke="rgba(255,255,255,0.35)" stroke-width="3" stroke-linecap="round"/>
  <rect x="754" y="482" width="115" height="10" rx="5" fill="rgba(255,255,255,0.13)"/>

  <!-- 상단 라벨 구분선 장식 -->
  <rect x="140" y="155" width="380" height="46" rx="14" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>
  <rect x="680" y="155" width="380" height="46" rx="14" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
  <!-- 구분 막대 (왼쪽 강조) -->
  <rect x="140" y="155" width="10" height="46" rx="5" fill="rgba(255,255,255,0.40)"/>
  <rect x="680" y="155" width="10" height="46" rx="5" fill="rgba(255,255,255,0.18)"/>
  <!-- 구분 막대 내부 선들 -->
  <line x1="165" y1="171" x2="480" y2="171" stroke="rgba(255,255,255,0.22)" stroke-width="6" stroke-linecap="round"/>
  <line x1="165" y1="187" x2="420" y2="187" stroke="rgba(255,255,255,0.14)" stroke-width="4" stroke-linecap="round"/>
  <line x1="705" y1="171" x2="1020" y2="171" stroke="rgba(255,255,255,0.14)" stroke-width="6" stroke-linecap="round"/>
  <line x1="705" y1="187" x2="900" y2="187" stroke="rgba(255,255,255,0.09)" stroke-width="4" stroke-linecap="round"/>
</svg>
