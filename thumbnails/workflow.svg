<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e3f30"/>
      <stop offset="100%" stop-color="#712f10"/>
    </linearGradient>
    <filter id="soft"><feGaussianBlur stdDeviation="22"/></filter>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)"/>
  <!-- 배경 -->
  <circle cx="600" cy="360" r="300" fill="rgba(255,255,255,0.04)" filter="url(#soft)"/>
  <circle cx="100" cy="100" r="120" fill="rgba(255,255,255,0.03)"/>
  <circle cx="1100" cy="640" r="140" fill="rgba(255,255,255,0.03)"/>

  <!-- 5단계 외래 워크플로우 -->
  <!-- 메인 연결선 -->
  <line x1="160" y1="340" x2="1040" y2="340" stroke="rgba(255,255,255,0.15)" stroke-width="3"/>

  <!-- 단계 1: 외래 전 준비 -->
  <circle cx="160" cy="340" r="52" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.35)" stroke-width="2.5"/>
  <circle cx="160" cy="340" r="24" fill="rgba(255,255,255,0.70)"/>
  <!-- 1 표시: 위쪽 텍스트 줄 장식 -->
  <rect x="116" y="420" width="88" height="8" rx="4" fill="rgba(255,255,255,0.22)"/>
  <rect x="126" y="434" width="68" height="6" rx="3" fill="rgba(255,255,255,0.14)"/>
  <!-- 시계 아이콘 느낌 (전 단계) -->
  <circle cx="160" cy="340" r="14" fill="none" stroke="#0e3f30" stroke-width="2.5"/>
  <line x1="160" y1="333" x2="160" y2="340" stroke="#0e3f30" stroke-width="2" stroke-linecap="round"/>
  <line x1="160" y1="340" x2="165" y2="344" stroke="#0e3f30" stroke-width="2" stroke-linecap="round"/>

  <!-- 단계 2 -->
  <circle cx="380" cy="340" r="48" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.32)" stroke-width="2.5"/>
  <circle cx="380" cy="340" r="22" fill="rgba(255,255,255,0.65)"/>
  <rect x="338" y="420" width="84" height="8" rx="4" fill="rgba(255,255,255,0.20)"/>
  <rect x="348" y="434" width="64" height="6" rx="3" fill="rgba(255,255,255,0.12)"/>
  <!-- 문서 아이콘 -->
  <rect x="371" y="331" width="18" height="20" rx="2" fill="none" stroke="#0e3f30" stroke-width="2"/>
  <line x1="375" y1="337" x2="385" y2="337" stroke="#0e3f30" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="375" y1="342" x2="385" y2="342" stroke="#0e3f30" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="375" y1="347" x2="381" y2="347" stroke="#0e3f30" stroke-width="1.5" stroke-linecap="round"/>

  <!-- 단계 3 (중앙, 강조) -->
  <circle cx="600" cy="340" r="58" fill="rgba(20,91,75,0.25)" stroke="rgba(255,255,255,0.75)" stroke-width="3.5"/>
  <circle cx="600" cy="340" r="28" fill="rgba(255,255,255,0.90)"/>
  <rect x="556" y="428" width="88" height="8" rx="4" fill="rgba(255,255,255,0.28)"/>
  <rect x="566" y="442" width="68" height="6" rx="3" fill="rgba(255,255,255,0.18)"/>
  <!-- 대화/의사소통 아이콘 -->
  <path d="M 588 331 Q 588 323 596 323 L 614 323 Q 622 323 622 331 L 622 345 Q 622 353 614 353 L 608 353 L 604 359 L 600 353 L 596 353 Q 588 353 588 345 Z" fill="none" stroke="#0e3f30" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- 단계 4 -->
  <circle cx="820" cy="340" r="48" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.32)" stroke-width="2.5"/>
  <circle cx="820" cy="340" r="22" fill="rgba(255,255,255,0.65)"/>
  <rect x="778" y="420" width="84" height="8" rx="4" fill="rgba(255,255,255,0.20)"/>
  <rect x="788" y="434" width="64" height="6" rx="3" fill="rgba(255,255,255,0.12)"/>
  <!-- 편집/요약 아이콘 -->
  <path d="M 808 332 L 826 332 M 808 340 L 826 340 M 808 348 L 820 348" stroke="#0e3f30" stroke-width="2.5" stroke-linecap="round"/>

  <!-- 단계 5 -->
  <circle cx="1040" cy="340" r="52" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.35)" stroke-width="2.5"/>
  <circle cx="1040" cy="340" r="24" fill="rgba(255,255,255,0.70)"/>
  <rect x="996" y="420" width="88" height="8" rx="4" fill="rgba(255,255,255,0.22)"/>
  <rect x="1006" y="434" width="68" height="6" rx="3" fill="rgba(255,255,255,0.14)"/>
  <!-- 체크/완료 아이콘 -->
  <path d="M 1027 340 L 1036 350 L 1053 330" fill="none" stroke="#0e3f30" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 화살표 -->
  <polygon points="242,333 242,347 264,340" fill="rgba(255,255,255,0.30)"/>
  <polygon points="462,333 462,347 484,340" fill="rgba(255,255,255,0.28)"/>
  <polygon points="682,333 682,347 704,340" fill="rgba(255,255,255,0.28)"/>
  <polygon points="902,333 902,347 924,340" fill="rgba(255,255,255,0.30)"/>

  <!-- 상단 레일 -->
  <rect x="80" y="200" width="1040" height="4" rx="2" fill="rgba(255,255,255,0.07)"/>
</svg>
