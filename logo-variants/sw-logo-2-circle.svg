<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg2" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#b87872"/>
      <stop offset="100%" stop-color="#7a4035"/>
    </linearGradient>
  </defs>
  <!-- Outer gold ring -->
  <circle cx="50" cy="50" r="49" fill="none" stroke="#c9a07a" stroke-width="2"/>
  <!-- Background fill -->
  <circle cx="50" cy="50" r="47" fill="url(#bg2)"/>
  <!-- Inner soft ring -->
  <circle cx="50" cy="50" r="43" fill="none" stroke="#fdf5ee" stroke-width="0.7" stroke-opacity="0.2"/>
  <!-- SW italic serif text -->
  <text
    x="50" y="65"
    font-family="Georgia, 'Palatino Linotype', Palatino, serif"
    font-size="42"
    font-weight="700"
    font-style="italic"
    fill="#fdf5ee"
    text-anchor="middle"
    letter-spacing="-0.5">SW</text>
  <!-- Gold accent line -->
  <line x1="34" y1="73" x2="66" y2="73" stroke="#c9a07a" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
</svg>
