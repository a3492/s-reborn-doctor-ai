<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Ivory background (soft, not pure white) -->
  <rect width="100" height="100" rx="22" fill="#faf0e6"/>
  <!-- Thin border -->
  <rect x="1.5" y="1.5" width="97" height="97" rx="21"
    fill="none" stroke="#c9a07a" stroke-width="1.5"/>
  <!-- SW outlined italic -->
  <text
    x="50" y="63"
    font-family="Georgia, 'Palatino Linotype', Palatino, serif"
    font-size="44"
    font-weight="700"
    font-style="italic"
    fill="none"
    stroke="#7a4035"
    stroke-width="1.8"
    stroke-linejoin="round"
    text-anchor="middle"
    letter-spacing="-1">SW</text>
  <!-- Gold underline accent -->
  <line x1="18" y1="76" x2="82" y2="76" stroke="#c9a07a" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Small gold dots at ends -->
  <circle cx="18" cy="76" r="2" fill="#c9a07a"/>
  <circle cx="82" cy="76" r="2" fill="#c9a07a"/>
</svg>
